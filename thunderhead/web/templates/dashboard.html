{% extends "base.html" %}
{% block content %}
<div class="dashboard">
    <div class="welcome">
        <h1>Thunderhead is running</h1>
        <p>Personal VPS &mdash; file server active</p>
    </div>
    <div class="cards">
        <a href="/files" class="card">
            <div class="card-icon">[~/]</div>
            <div class="card-title">File Storage</div>
            <div class="card-desc">Browse, upload, manage files</div>
        </a>
        <div class="card card-disabled">
            <div class="card-icon">[#]</div>
            <div class="card-title">Secure Tunnel</div>
            <div class="card-desc">Remote access (coming soon)</div>
        </div>
        <div class="card card-disabled">
            <div class="card-icon">[*]</div>
            <div class="card-title">Settings</div>
            <div class="card-desc">Configure Thunderhead</div>
        </div>
    </div>
    <div class="info-box">
        <strong>VPS Root:</strong> <span id="vps-root">/</span><br>
        <strong>Server:</strong> <span id="server-addr">loading...</span>
    </div>
</div>
<script>
(async function() {
    const token = sessionStorage.getItem("token");
    if (!token) { window.location.href = "/login"; return; }

    const res = await fetch("/api/fs/info?path=/", {
        headers: { "Authorization": "Bearer " + token }
    });
    if (res.status === 401) {
        sessionStorage.removeItem("token");
        window.location.href = "/login";
    }
    if (res.ok) {
        document.getElementById("server-addr").textContent = window.location.host;
    }
})();
</script>
{% endblock %}
